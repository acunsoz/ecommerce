# Render'?n bize verece?i ortam de?i?kenlerini (Environment Variables) buraya ba?l?yoruz
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
#------------------------------
# PostgreSQL S³r³c³ ve Lehńe (Dialect) Ayarlar?
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#--------------------------------------------------------------

# Hibernate'in tablolar? de?i?tirmesini KES?NL?KLE engelle
spring.jpa.hibernate.ddl-auto=validate
# Canl?da SQL sorgular?n?n loglarda kabak gibi g÷r³nmesini engelle (G³venlik ińin gizlenmeli)
spring.jpa.show-sql=false

